apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/subham601/ai-devops.git"
    targetRevision: HEAD
    path: "helm/ecommerce"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: ecommerce-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true

