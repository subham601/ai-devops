apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "file:///home/cis/ai-devops-project/helm"
    targetRevision: ""
    path: "ecommerce"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: ecommerce-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true

