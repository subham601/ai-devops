<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Ecommerce Demo</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Login</h1>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" placeholder="demo@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="password123" />
      </div>
      <div id="error" class="error" aria-live="polite"></div>
      <button id="loginBtn" class="btn" type="button">Login</button>
      <p class="muted" style="margin-top: 12px;">
        Demo credentials: <b>demo@example.com</b> / <b>password123</b>
      </p>
    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    window.__PAGE__ = 'login';
    window.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
