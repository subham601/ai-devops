apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ecommerce-network-policy
  namespace: ecommerce-system
spec:
  podSelector:
    matchLabels:
      app: ecommerce
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic to API from anywhere within the namespace (adjust if needed)
    - from:
        - namespaceSelector:
            matchLabels:
              name: ecommerce-system
      ports:
        - protocol: TCP
          port: 8000

