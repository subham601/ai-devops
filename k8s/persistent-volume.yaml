apiVersion: v1
kind: PersistentVolume
metadata:
  name: ecommerce-pv
  namespace: ecommerce-system
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  volumeMode: Filesystem
  hostPath:
    path: /tmp/ecommerce-data

