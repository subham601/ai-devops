name: CI/CD - DockerHub -> Helm values -> ArgoCD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: "Git SHA to roll back helm/ecommerce/values.yaml image.tag to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-test-and-release:
    runs-on: ubuntu-latest

    env:
      IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/ai-devops-project-web
      IMAGE_TAG: ${{ github.sha }}
      CHART_PATH: helm/ecommerce
      VALUES_FILE: helm/ecommerce/values.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # Ensure dev deps are installed for FastAPI TestClient (httpx) + pytest
          pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        run: |
          pip install pytest
          pytest -q backend/tests

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_REPO}:${IMAGE_TAG}" -t "${IMAGE_REPO}:latest" -f backend/Dockerfile .

      - name: Push Docker image
        run: |
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"
          docker push "${IMAGE_REPO}:latest"

      - name: Update Helm values.yaml image tag
        run: |
          python - <<'PY'
          import pathlib, re
          values_path = pathlib.Path("helm/ecommerce/values.yaml")
          text = values_path.read_text()

          # Update only the tag field to the commit SHA
          # Expected structure:
          # image:
          #   repository: ...
          #   tag: latest
          def repl_tag(match):
            return match.group(1) + match.group(2) + "${IMAGE_TAG}" + match.group(3)

          # Safer: replace the first `tag:` under `image:` block
          new_text = re.sub(
              r"(?m)^(\s*tag:\s*)([^\n]*)(\s*)$",
              lambda m: m.group(1) + "${IMAGE_TAG}" + m.group(3),
              text,
              count=1
          )

          if new_text == text:
            raise SystemExit("Failed to update image.tag in values.yaml")

          values_path.write_text(new_text)
          print("Updated", values_path)
          PY

      - name: Helm lint
        run: |
          pip install helm==0.0.0 || true
          # Use the system helm if available; otherwise install
          if ! command -v helm >/dev/null 2>&1; then
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          helm lint "${CHART_PATH}"

      - name: Commit updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure workflow is not committing the same SHA repeatedly
          if git diff --quiet -- "${VALUES_FILE}"; then
            echo "No changes to commit for ${VALUES_FILE}"
            exit 0
          fi

          git add "${VALUES_FILE}"
          git commit -m "ci: update helm image tag to ${IMAGE_TAG}"
          git push

      - name: ArgoCD auto-sync note
        run: echo "ArgoCD is configured with automated sync; committing values.yaml should trigger a sync."

  # Optional rollback workflow
  rollback:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_sha != '' }}
    runs-on: ubuntu-latest
    env:
      CHART_PATH: helm/ecommerce
      VALUES_FILE: helm/ecommerce/values.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore helm image tag to provided SHA
        run: |
          if [ -z "${{ github.event.inputs.rollback_sha }}" ]; then
            echo "Missing rollback_sha input"
            exit 1
          fi
          python - <<'PY'
          import pathlib, re
          rollback_sha = "${{ github.event.inputs.rollback_sha }}"
          values_path = pathlib.Path("helm/ecommerce/values.yaml")
          text = values_path.read_text()

          new_text = re.sub(
              r"(?m)^(\s*tag:\s*)([^\n]*)(\s*)$",
              lambda m: m.group(1) + rollback_sha + m.group(3),
              text,
              count=1
          )
          if new_text == text:
            raise SystemExit("Failed to update image.tag in values.yaml")
          values_path.write_text(new_text)
          print("Rolled back image.tag to", rollback_sha)
          PY

      - name: Commit rollback
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${VALUES_FILE}"
          git commit -m "rollback: set helm image tag to ${{ github.event.inputs.rollback_sha }}" || true
          git push

      - name: Helm lint
        run: |
          if ! command -v helm >/dev/null 2>&1; then
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          helm lint "${CHART_PATH}"
