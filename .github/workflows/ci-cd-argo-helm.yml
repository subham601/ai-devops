name: CI/CD - DockerHub -> Helm values -> ArgoCD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/ai-devops-project-web
  CHART_PATH: helm/ecommerce
  VALUES_FILE: helm/ecommerce/values.yaml

jobs:
  build-test-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        run: |
          pip install pytest
          pytest -q backend/tests

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute next image version tag (v1 -> v2 -> ...)
        run: |
          python - <<'PY'
          import pathlib, re

          values_path = pathlib.Path("helm/ecommerce/values.yaml")
          text = values_path.read_text()

          m = re.search(r"(?ms)^image:\n(?P<body>(?:^[ \t].*\n)+)", text)
          if not m:
            raise SystemExit("Failed to find top-level `image:` block in helm/ecommerce/values.yaml")
          body = m.group("body")

          tm = re.search(r"(?m)^\s*tag:\s*\"?(v\d+)\"?\s*$", body)
          if not tm:
            raise SystemExit("Missing or invalid `image.tag` (expected vN) in helm/ecommerce/values.yaml")

          current = tm.group(1)
          n = int(current[1:])
          next_tag = f"v{n+1}"

          with open("/tmp/next_tag.txt", "w") as f:
            f.write(next_tag)

          print(f"current={current}")
          print(f"next={next_tag}")
          PY

          echo "NEXT_TAG=$(cat /tmp/next_tag.txt)" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_REPO}:${NEXT_TAG}" -f backend/Dockerfile .

      - name: Push Docker image
        run: |
          docker push "${IMAGE_REPO}:${NEXT_TAG}"

      - name: Update Helm values.yaml image tag
        run: |
          python - <<'PY'
          import pathlib, re, os

          values_path = pathlib.Path("helm/ecommerce/values.yaml")
          text = values_path.read_text()
          next_tag = os.environ["NEXT_TAG"]

          m = re.search(r"(?ms)^image:\n(?P<body>(?:^[ \t].*\n)+)", text)
          if not m:
            raise SystemExit("Failed to find top-level `image:` block in helm/ecommerce/values.yaml")
          body = m.group("body")

          repo_pattern = r"(?m)^(\s*repository:\s*)([^\n]*)(\s*)$"
          if not re.search(repo_pattern, body):
            raise SystemExit("Missing `image.repository` inside image block")

          def repl_tag(match):
            # group(2) is the old tag content; group(1) contains "tag:" + whitespace
            old_val = match.group(2).strip()
            if old_val.startswith('"') and old_val.endswith('"'):
              return match.group(1) + f"\"{next_tag}\"" + match.group(3)
            return match.group(1) + next_tag + match.group(3)


          new_body, n = re.subn(
              r"(?m)^(\s*tag:\s*)([^\n]*?)(\s*)$",
              repl_tag,
              body,
              count=1,
          )
          if n != 1:
            raise SystemExit(f"Failed to replace exactly 1 `image.tag` line (replaced {n})")

          new_text = text[:m.start("body")] + new_body + text[m.end("body"):]
          values_path.write_text(new_text)
          print("Updated image.tag to", next_tag)
          PY

      - name: Helm lint
        run: |
          pip install helm==0.0.0 || true
          if ! command -v helm >/dev/null 2>&1; then
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          helm lint "${CHART_PATH}"

      - name: Commit updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${VALUES_FILE}"; then
            echo "No changes to commit for ${VALUES_FILE}"
            exit 0
          fi

          git add "${VALUES_FILE}"
          git commit -m "ci: bump helm image tag to ${NEXT_TAG}"
          git push

      - name: ArgoCD auto-sync note
        run: echo "ArgoCD automated sync should apply the updated Helm values.yaml (new image tag)."

